<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.W.S. Montanus</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<a href="https://swsmontanvs.com/" class="home-link">
  <img src="homelink.png" alt="Montanus">
</a>

<!-- LANG -->
<div class="lang-switcher">
  <img src="eng.png" alt="English">
  <img src="hun.png" alt="Magyar">
</div>

<!-- BG -->
<div class="hero-bg"></div>

<!-- HERO -->
<section class="hero">

  <nav class="main-menu">
    <a href="areanis.html">
      <img src="areanis-title.png" class="menu-areanis">
    </a>
  </nav>

  <div class="hero-text">
    <h1>The official website of S.W.S. Montanus</h1>
    <p>Under development...</p>
  </div>

</section>

<!-- CONTENT -->
<section class="content">

  <h2>Welcome</h2>

  <p>Lorem ipsum dolor sit amet...</p>

  <div class="content-break"></div>

  <!-- 🔥 LOGÓ BLOKK -->
  <div class="content-logo">
    <img src="montanvslogo.png" class="content-logo-img">
  </div>

  <div class="content-break"></div>

  <p>Lorem ipsum dolor sit amet...</p>

</section>

<!-- ⚡ LOGO SECTION -->
<section class="logo-section">
  <div class="logo-bg"></div>
</section>

<!-- FOOTER -->
<footer class="site-footer">

  <div class="footer-top">

    <div class="footer-left">
      Developed by S.W.S. Montanus
    </div>

    <div class="footer-center">
      <img src="symbol.png" class="footer-symbol">
    </div>

    <div class="footer-right">
      <a href="#">Contact</a>
      <a href="#">Terms</a>
      <a href="#">Privacy</a>
    </div>

  </div>

  <div class="footer-bottom">
    © 2026 S.W.S. Montanus
  </div>

</footer>

<!-- SCROLL -->
<a href="#" class="scroll-top" id="scrollTopBtn">↑</a>

<!-- CORNER -->
<img src="logo.png" class="corner-logo">

<script>

const bg = document.querySelector(".hero-bg");
const content = document.querySelector(".content");
const hero = document.querySelector(".hero");
const scrollTopBtn = document.getElementById("scrollTopBtn");
const logoSection = document.querySelector(".logo-section");
const logoBg = document.querySelector(".logo-bg");

let ticking = false;

window.addEventListener("scroll", () => {

  if (!ticking) {

    requestAnimationFrame(() => {

      const scrollY = window.scrollY;

      const speed = 0.2;
      const zoomSpeed = 0.00005;
      const blurSpeed = 0.002;
      const contentSpeed = 0.85;

      const translate = -scrollY * speed;
      const scale = 1 + scrollY * zoomSpeed;
      const blur = Math.min(scrollY * blurSpeed, 3);

      bg.style.transform = `translateY(${translate}px) scale(${scale})`;
      bg.style.filter = `blur(${blur}px)`;

      content.style.transform = `translateY(${scrollY * (1 - contentSpeed)}px)`;

      scrollTopBtn.classList.toggle("visible", scrollY > 400);

      // ⚡ LOGO SECTION
      if (logoSection && logoBg) {
        const rect = logoSection.getBoundingClientRect();

        if (rect.top < window.innerHeight && rect.bottom > 0) {
          logoBg.style.transform = `translateY(${-rect.top * 0.3}px)`;
        }
      }

      ticking = false;

    });

    ticking = true;
  }

});

// SCROLL TOP
scrollTopBtn.addEventListener("click", (e) => {
  e.preventDefault();
  window.scrollTo({ top: 0, behavior: "smooth" });
  document.activeElement.blur();
});

// ⚡ VILLÁM
function flash() {
  if (!logoBg) return;

  logoBg.classList.add("flash");

  setTimeout(() => {
    logoBg.classList.remove("flash");
  }, 120);
}

setInterval(() => {

  if (!logoSection) return;

  const rect = logoSection.getBoundingClientRect();

  if (rect.top < window.innerHeight && rect.bottom > 0) {
    if (Math.random() > 0.7) flash();
  }

}, 1200);

</script>

</body>
</html>
