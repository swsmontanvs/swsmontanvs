<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Montanus</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<a href="index.html" class="home-link">
  <img src="homelink.png" alt="Montanus">
</a>

<div class="lang-switcher">
  <img src="eng.png" alt="English" data-lang="en">
  <img src="hun.png" alt="Magyar" data-lang="hu">
</div>

<div class="hero-bg"></div>

<section class="hero">
  <div class="hero-text">
    <h1>The official website of S.W.S. Montanus, author</h1>
    <p>Under development...</p>
  </div>
</section>

<section class="content">
  <h2>Welcome</h2>
  <p>This is where the journey begins...</p>
</section>

<script>
  const bg = document.querySelector(".hero-bg");
  const content = document.querySelector(".content");
  const homeLink = document.querySelector(".home-link");
  const hero = document.querySelector(".hero");

  let ticking = false;

  window.addEventListener("scroll", () => {
    if (!ticking) {
      window.requestAnimationFrame(() => {

        const scrollY = window.scrollY;

        // 🎬 PARALLAX
        const speed = 0.2;
        const zoomSpeed = 0.00005;
        const blurSpeed = 0.002;
        const contentSpeed = 0.85;

        const translate = -scrollY * speed;
        const bgScale = 1 + scrollY * zoomSpeed;
        const blur = Math.min(scrollY * blurSpeed, 3);
        const contentTranslate = scrollY * (1 - contentSpeed);

        bg.style.transform = `translateY(${translate}px) scale(${bgScale})`;
        bg.style.filter = `blur(${blur}px)`;

        content.style.transform = `translateY(${contentTranslate}px)`;

        // 🔥 HOMELINK – HOSSZABB + LÁGYABB

        const scrollRange = hero.offsetHeight + 600; // 🔥 MEGNÖVELVE

        let progress = Math.min(scrollY / scrollRange, 1);

        // később indul
        progress = Math.max((progress - 0.7) / 0.6, 0);

        // 🔥 LÁGY easing (nem gyorsít a végén!)
        progress = progress * progress;

        const logoScale = 1 - (progress * 0.55);

        const top = 30 - (progress * 15);
        const left = 80 - (progress * 65);

        homeLink.style.transform = `scale(${logoScale})`;
        homeLink.style.top = `${top}px`;
        homeLink.style.left = `${left}px`;

        ticking = false;

      });

      ticking = true;
    }
  });
</script>

</body>
</html>
