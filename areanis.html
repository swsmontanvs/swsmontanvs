<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Areanis</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="areanis.css">
</head>

<body class="areanis-page">

  <!-- BACKGROUND -->
  <div class="areanis-bg"></div>

  <!-- HOME LINK -->
  <a href="https://swsmontanvs.com/" class="home-link">
    <img src="homelink.png" alt="Home">
  </a>

  <!-- LANGUAGE SWITCH -->
  <div class="lang-switcher">
    <button class="lang-btn">
      <img src="eng.png" alt="English">
    </button>
    <button class="lang-btn">
      <img src="hun.png" alt="Magyar">
    </button>
  </div>

  <!-- HERO -->
  <header class="areanis-hero">
    <video autoplay muted loop playsinline class="areanis-video">
      <source src="areanis-hero.mp4" type="video/mp4">
    </video>
  </header>

  <!-- MENU -->
  <main class="areanis-menu">

    <img src="scene1.jpg" class="areanis-item item1">
    <img src="scene2.jpg" class="areanis-item item2">
    <img src="scene3.jpg" class="areanis-item item3">
    <img src="scene4.jpg" class="areanis-item item4">

    <img src="scene5.jpg" class="areanis-item item5">
    <img src="scene6.jpg" class="areanis-item item6">
    <img src="scene7.jpg" class="areanis-item item7">

  </main>

  <!-- FOOTER (KÜLÖN!) -->
  <footer class="site-footer">
    <div class="footer-left">
      Developed by STRYN DL-01 Studio
    </div>

    <div class="footer-top">
      <div class="footer-center">
        <img src="symbol.png" class="footer-symbol">
      </div>

      <div class="footer-right">
        <a href="#">Contact</a>
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
      </div>
    </div>

    <div class="footer-bottom">
      &copy; 2026 S.W.S. Montanus
    </div>
  </footer>

  <!-- SCROLL -->
  
  <button class="scroll-sword" id="scrollSword" type="button" aria-label="Back to top">
    <img src="scroll-sword.png" alt="Scroll to top">
  </button>

  <script src="script.js"></script>
  <script src="areanis.js"></script>

  <script src="areanis-scroll.js"></script>

</body>
</html>
